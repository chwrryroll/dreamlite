<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/co_pt.css">
    <link rel="icon" type="image/x-icon" href="dllogo.png">
    <title>Cell Organelles</title>
</head>
<body class="cellorganelles">

    <div id="navbar">
    <h1>Dreamlite</h1>

    <button id="info_btn">
        Show Information
    </button>
</div>

    <div id="cell_bar">
        <button id="btn_nucleus">Nucleus</button>
        <button id="btn_mitochondria">Mitochondria</button>
        <button id="btn_er">Endoplasmic Reticulum</button>
        <button id="btn_ga">Golgi Apparatus</button>
        <button id="btn_lysosomes">Lysosomes</button>
        <button id="btn_vacuoles">Vacuoles</button>
        <button id="btn_ac">Animal cell</button>
        <button id="btn_pc">Plant cell</button>
    </div>
    <div class="codia active" id="nucleus_dia"></div>
    <div class="codia" id="mitochondria_dia"></div>
    <div class="codia" id="er_dia"></div>
    <div class="codia" id="ga_dia"></div>
    <div class="codia" id="lysosomes_dia"></div>
    <div class="codia" id="vacuoles_dia"></div>
    <div class="codia" id="ac_dia"></div>
    <div class="codia" id="pc_dia"></div>

    <div id="info_panel">

    <button id="close_info">
        ✕
    </button>

    

    <h2 id="info_title"></h2>

    <div class="info_section">
        <h3>Function</h3>
        <p id="info_function"></p>
    </div>

    <div class="info_section">
        <h3>Interesting Facts</h3>
        <ul id="fact_list"></ul>
    </div>

</div>

<script type="module" src="./src/main.js"></script>

</body>
</html>
